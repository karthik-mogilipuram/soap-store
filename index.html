<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Amma's Ayurvedic Soaps</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500&family=Mulish:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="page">

  <header class="site-header">
    <svg width="34" height="34" viewBox="0 0 34 34" aria-hidden="true">
      <rect x="3" y="3" width="28" height="28" rx="8" fill="var(--cream)" stroke="var(--leaf-dark)" stroke-width="2"></rect>
      <ellipse cx="17" cy="17" rx="5.5" ry="9.5" fill="var(--leaf-dark)" transform="rotate(45 17 17)"></ellipse>
      <line x1="17" y1="8.5" x2="17" y2="25.5" stroke="var(--cream)" stroke-width="1" transform="rotate(45 17 17)"></line>
    </svg>
    <span class="wordmark">Amma's Ayurvedic Soaps</span>
  </header>

  <main>
    <section class="product-grid" id="product-grid">
      <article class="product-card" data-name="Charcoal" data-price="149">
        <div class="product-image">
          <img src="assets/images/charcoal-soap.png" alt="Charcoal soap bar">
        </div>
        <div class="product-body">
          <h3 class="product-name">Charcoal</h3>
          <div class="product-ingredients">Charcoal &middot; Aloe Vera &middot; Coconut Oil</div>
          <p class="product-description">Deep-cleansing bar that draws out dirt and oil, unclogs and tightens pores. Great for breakout-prone, oily skin.</p>
          <div class="product-price">
            <span class="price-now">&#8377;149</span>
            <span class="price-mrp">&#8377;199</span>
          </div>
          <button class="btn-add" type="button" data-action="add">Add to order</button>
        </div>
      </article>
    </section>
  </main>

</div>
<script src="app.js"></script>
</body>
</html>
